gateway:
  host: 127.0.0.1
  port: 4000
  version: alpha-0.6
logs:
  level: INFO
  file: logs/qgateway.log
models:
  scan_paths:
  - ../Models
  - Models
  - models
  - AI/Models
launcher:
  executables:
  - llama-server
  - ollama
  - lmstudio
runtime:
  provider: llama.cpp
  executable: ../llama-server.exe
  model_path: ../Models/QW.gguf
  alias: Qwythos-9B
  host: 0.0.0.0
  port: 8999
  gpu_layers: all
  context_size: 16384
  flash_attention: auto
  reasoning: 'off'
  reasoning_format: none
  log_colors: 'off'
  extra_args: []
